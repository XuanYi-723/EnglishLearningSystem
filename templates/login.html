<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登入 / 註冊 - 智慧英語學習系統</title>
    <style>
        :root {
            --glass-bg: rgba(255, 255, 255, 0.25);
            --glass-border: rgba(255, 255, 255, 0.4);
            --glass-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.15);
            --primary-color: #6366f1;
            --primary-hover: #4f46e5;
            --secondary-color: #f59e0b;
            --text-main: #1e293b;
            --text-muted: #475569;
            --accent: #10b981;
        }

        body {
            margin: 0;
            font-family: 'Inter', 'Segoe UI', "Microsoft JhengHei", sans-serif;
            background: linear-gradient(135deg, #e0c3fc 0%, #8ec5fc 100%);
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            height: 100vh;
        }

        .auth-container {
            background: var(--glass-bg);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border: 1px solid var(--glass-border);
            padding: 40px;
            border-radius: 24px;
            box-shadow: var(--glass-shadow);
            width: 100%;
            max-width: 400px;
            box-sizing: border-box;
            text-align: center;
        }

        .auth-container h2 {
            margin-top: 0;
            margin-bottom: 25px;
            color: var(--primary-color);
            font-size: 1.8rem;
            font-weight: 800;
        }

        .input-group {
            margin-bottom: 20px;
            text-align: left;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: var(--text-main);
            font-weight: bold;
            font-size: 0.95rem;
        }

        .input-group input {
            width: 100%;
            padding: 14px 15px;
            border-radius: 12px;
            border: 2px solid rgba(255, 255, 255, 0.6);
            background: rgba(255, 255, 255, 0.5);
            color: var(--text-main);
            font-size: 1rem;
            box-sizing: border-box;
            transition: all 0.3s;
        }

        .input-group input:focus {
            outline: none;
            border-color: var(--primary-color);
            background: rgba(255, 255, 255, 0.8);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        .auth-btn {
            background: linear-gradient(135deg, #6366f1, #4f46e5);
            color: white;
            border: none;
            padding: 16px;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            transition: all 0.3s;
            box-shadow: 0 8px 20px rgba(99, 102, 241, 0.3);
            margin-top: 10px;
        }

        .auth-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(99, 102, 241, 0.4);
        }

        .toggle-link {
            display: inline-block;
            margin-top: 25px;
            color: var(--primary-color);
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        .toggle-link:hover {
            color: var(--primary-hover);
            text-decoration: underline;
        }

        .flash-messages {
            margin-bottom: 20px;
        }

        .alert {
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 15px;
            font-size: 0.95rem;
            font-weight: bold;
        }

        .alert-error {
            background: rgba(254, 226, 226, 0.8);
            color: #ef4444;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .alert-success {
            background: rgba(209, 250, 229, 0.8);
            color: #10b981;
            border: 1px solid rgba(16, 185, 129, 0.3);
        }

        #register-form {
            display: none;
        }
    </style>
</head>

<body>

    <div class="auth-container">
        <!-- Flash messages display -->
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        <div class="flash-messages">
            {% for category, message in messages %}
            <div class="alert alert-{{ category }}">{{ message }}</div>
            {% endfor %}
        </div>
        {% endif %}
        {% endwith %}

        <!-- Login Form -->
        <div id="login-form">
            <h2>登入專屬導師</h2>
            <form action="{{ url_for('login') }}" method="POST">
                <div class="input-group">
                    <label for="login-username">帳號名稱</label>
                    <input type="text" id="login-username" name="username" required>
                </div>
                <div class="input-group">
                    <label for="login-password">安全密碼</label>
                    <input type="password" id="login-password" name="password" required>
                </div>
                <button type="submit" class="auth-btn">進入學習系統</button>
            </form>
            <span class="toggle-link" onclick="toggleForms()">還沒有帳號？立即註冊</span>
            <br>
            <a href="{{ url_for('index') }}" class="toggle-link"
                style="color:var(--text-muted); font-size:0.9rem; margin-top:15px;">先以訪客身分繼續</a>
        </div>

        <!-- Register Form -->
        <div id="register-form">
            <h2>建立個人檔案</h2>
            <form action="{{ url_for('register') }}" method="POST">
                <div class="input-group">
                    <label for="reg-username">設定帳號</label>
                    <input type="text" id="reg-username" name="username" required>
                </div>
                <div class="input-group">
                    <label for="reg-password">設定密碼</label>
                    <input type="password" id="reg-password" name="password" required>
                </div>
                <button type="submit" class="auth-btn"
                    style="background: linear-gradient(135deg, #10b981, #059669); box-shadow: 0 8px 20px rgba(16, 185, 129, 0.3);">完成註冊</button>
            </form>
            <span class="toggle-link" onclick="toggleForms()">已有帳號？點此登入</span>
        </div>
    </div>

    <script>
        function toggleForms() {
            const loginForm = document.getElementById('login-form');
            const registerForm = document.getElementById('register-form');
            if (loginForm.style.display === 'none') {
                loginForm.style.display = 'block';
                registerForm.style.display = 'none';
            } else {
                loginForm.style.display = 'none';
                registerForm.style.display = 'block';
            }
        }
    </script>
</body>

</html>
