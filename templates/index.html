<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>智慧英語學習系統 </title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', Arial; background-color: #f8fafc; color: #1e293b; }
        .container { display: flex; height: 100vh; }
        .left { flex: 4; padding: 30px; background: white; border-right: 1px solid #e2e8f0; }
        .right { flex: 6; padding: 30px; overflow-y: auto; }
        textarea { width: 100%; height: 250px; padding: 15px; border-radius: 12px; border: 2px solid #cbd5e1; font-size: 16px; box-sizing: border-box; }
        .level-btn { background: #f1f5f9; color: #475569; border: none; padding: 12px 20px; margin: 5px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .level-btn.active { background: #3b82f6; color: white; }
        .action-btn { background: #f59e0b; color: white; border: none; padding: 18px; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 20px; }
        .csv-btn { background: #10b981; color: white; border: none; padding: 12px; border-radius: 8px; cursor: pointer; margin-top: 15px; width: 100%; font-weight: bold; display: none; }
        mark { background: #fef08a; padding: 2px; border-radius: 4px; }
        .word-card { background: white; padding: 20px; margin-bottom: 15px; border-radius: 12px; border-left: 5px solid #3b82f6; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
    </style>
</head>
<body>
    <div class="container">
        <div class="left">
            <h2>1. 輸入教材文章</h2>
            <textarea id="textInput" placeholder="請貼上英文文章內容..."></textarea>
            
            <h2 style="margin-top:25px;">2. 選擇學生程度</h2>
            <button onclick="selectLevel('簡單', this)" class="level-btn">簡單</button>
            <button onclick="selectLevel('中等', this)" class="level-btn">中等</button>
            <button onclick="selectLevel('困難', this)" class="level-btn">困難</button>
            <button onclick="selectLevel('全部', this)" class="level-btn">全部</button>

            <div id="actionArea" style="display:none;">
                <button onclick="analyze()" class="action-btn">開始 AI 分析 (<span id="lvLab">全部</span>)</button>
                <button id="csvBtn" class="csv-btn" onclick="exportCSV()">📁 下載單字學習清單 (CSV)</button>
            </div>
        </div>
        <div class="right">
            <h2>3. 分析結果與教材生成</h2>
            <div id="highlightedArticle" style="background:white; padding:20px; border-radius:10px; margin-bottom:20px;">等待分析...</div>
            <div id="output"></div>
        </div>
    </div>
    <script>
        let currentLevel = "全部";
        let currentVocab = null;

        function selectLevel(level, btn) {
            currentLevel = level;
            document.getElementById("lvLab").innerText = level;
            document.getElementById("actionArea").style.display = "block";
            document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        async function analyze() {
            const text = document.getElementById("textInput").value;
            const outputDiv = document.getElementById("output");
            outputDiv.innerHTML = "系統分析中...";
            const response = await fetch('/analyze', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ text: text, level: currentLevel })
            });
            const data = await response.json();
            currentVocab = data.vocabulary;
            document.getElementById("highlightedArticle").innerHTML = data.highlighted;
            document.getElementById("csvBtn").style.display = "block";
            let html = "";
            for (let word in data.vocabulary) {
                let item = data.vocabulary[word];
                html += `<div class="word-card"><b>${word.toUpperCase()}</b> (${item.level})<br>${item.pos} | ${item.phonetic}<br><span style="color:#c2410c;">${item.chinese}</span><br>${item.definition}</div>`;
            }
            outputDiv.innerHTML = html || "找不到單字。";
        }

        async function exportCSV() {
            const response = await fetch('/export_data', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ vocabulary: currentVocab })
            });
            const blob = await response.blob();
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = "智慧單字學習清單.csv";
            a.click();
        }
    </script>
</body>
</html>
