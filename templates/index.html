<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>智慧英語學習系統 - Gemini AI 導師版</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', "Microsoft JhengHei", sans-serif; background-color: #f8fafc; color: #1e293b; }
        .container { display: flex; height: 100vh; }
        .left { flex: 4; padding: 25px; background: white; border-right: 1px solid #e2e8f0; overflow-y: auto; }
        .right { flex: 6; padding: 25px; overflow-y: auto; }
        
        h2 { color: #475569; border-left: 6px solid #8b5cf6; padding-left: 12px; margin-bottom: 20px; }
        textarea { width: 100%; height: 220px; padding: 15px; border-radius: 12px; border: 2px solid #e2e8f0; font-size: 18px; line-height: 1.6; box-sizing: border-box; }
        
        .level-btn { background: #f1f5f9; color: #475569; border: 1px solid #cbd5e1; padding: 12px 18px; margin: 4px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .level-btn.active { background: #8b5cf6; color: white; border-color: #7c3aed; }
        
        .action-btn { background: #f59e0b; color: white; border: none; padding: 20px; border-radius: 12px; font-size: 20px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 20px; }
        .game-btn { background: #8b5cf6; color: white; border: none; padding: 15px; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; display: none; }
        .csv-btn { background: #10b981; color: white; border: none; padding: 12px; border-radius: 12px; cursor: pointer; margin-top: 10px; width: 100%; display: none; }

        #highlightedArticle { background: white; padding: 25px; border-radius: 15px; margin-bottom: 25px; line-height: 2; font-size: 1.2em; border: 1px solid #e2e8f0; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        mark { background: #fef08a; padding: 2px 4px; border-radius: 4px; font-weight: bold; color: #b45309; }

        .word-card { background: white; padding: 25px; margin-bottom: 20px; border-radius: 16px; border-left: 10px solid #8b5cf6; box-shadow: 0 4px 6px rgba(0,0,0,0.05); position: relative; }
        .ai-tag { background: #ede9fe; color: #7c3aed; padding: 4px 12px; border-radius: 20px; font-size: 13px; font-weight: bold; position: absolute; right: 20px; top: 20px; }
        .ai-content { background: #f8fafc; padding: 15px; border-radius: 12px; margin-top: 12px; font-size: 1.1em; line-height: 1.6; color: #334155; border: 1px solid #e2e8f0; }
        
        #gameOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(15, 23, 42, 0.98); z-index: 2000; padding: 30px; box-sizing: border-box; color: white; text-align: center; }
        .game-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 20px; max-width: 1200px; margin: 40px auto; }
        .card { background: white; color: #1e293b; padding: 25px; border-radius: 18px; cursor: pointer; min-height: 140px; display: flex; flex-direction: column; align-items: center; justify-content: center; border: 4px solid transparent; transition: 0.2s; }
        .card.selected { border-color: #8b5cf6; transform: scale(1.05); }
        .card.matched { background: #dcfce7; color: #166534; opacity: 0.6; cursor: default; border-color: #22c55e; }
        .close-game-btn { padding: 12px 40px; border-radius: 30px; border: none; background: #ef4444; color: white; font-weight: bold; font-size: 18px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="gameOverlay">
        <h1>🧠 智慧單字配對挑戰</h1>
        <p style="font-size: 1.3em;">請找出對應的「英文單字」與「中文意思」！</p>
        <button onclick="closeGame()" class="close-game-btn">返回學習介面</button>
        <div id="gameGrid" class="game-grid"></div>
    </div>

    <div class="container">
        <div class="left">
            <h2>1. 貼上文章內容</h2>
            <textarea id="textInput" placeholder="請在此輸入英文文章..."></textarea>
            
            <h2 style="margin-top:35px;">2. 設定學習等級</h2>
            <div id="levelSelector">
                <button onclick="selectLevel('簡單', this)" class="level-btn">簡單</button>
                <button onclick="selectLevel('中等', this)" class="level-btn">中等</button>
                <button onclick="selectLevel('困難', this)" class="level-btn">困難</button>
                <button onclick="selectLevel('全部', this)" class="level-btn active">全部</button>
            </div>

            <button onclick="analyze()" class="action-btn">🚀 啟動 AI 智慧老師</button>
            <button id="gameBtn" class="game-btn" onclick="openGame()">🎮 挑戰單字連連看</button>
            <button id="csvBtn" class="csv-btn" onclick="exportCSV()">📁 下載單字表</button>
        </div>

        <div class="right">
            <h2>3. AI 學習報告</h2>
            <div id="highlightedArticle">等待系統分析中...</div>
            <div id="output"></div>
        </div>
    </div>

    <script>
        let currentLevel = "全部";
        let currentVocab = null;
        let firstCard = null;

        function selectLevel(level, btn) {
            currentLevel = level;
            document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        async function analyze() {
            const text = document.getElementById("textInput").value;
            if (!text) return alert("請輸入文字！");
            
            const outputDiv = document.getElementById("output");
            outputDiv.innerHTML = "<div style='text-align:center; padding:60px;'><h3>🔮 AI 老師正在編寫個人化教材...</h3></div>";

            try {
                const response = await fetch('/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: text, level: currentLevel })
                });
                const data = await response.json();
                currentVocab = data.vocabulary;

                document.getElementById("highlightedArticle").innerHTML = data.highlighted;
                document.getElementById("gameBtn").style.display = "block";
                document.getElementById("csvBtn").style.display = "block";

                let html = "";
                for (let word in data.vocabulary) {
                    let item = data.vocabulary[word];
                    html += `<div class="word-card">
                        <span class="ai-tag">Gemini AI 教學</span>
                        <b style="font-size:1.5em;">${word.toUpperCase()}</b> 
                        <span style="color:#94a3b8; margin-left:10px;">[${item.level}]</span><br>
                        <span style="color:#64748b; font-size:1.1em;">${item.pos} | ${item.phonetic}</span><br>
                        <b style="color:#c2410c; display:block; margin-top:10px; font-size:1.3em;">${item.chinese}</b>
                        <div class="ai-content">${item.definition.replace(/\n/g, '<br>')}</div>
                    </div>`;
                }
                outputDiv.innerHTML = html || "未發現符合等級的單字。";
            } catch (e) {
                outputDiv.innerHTML = "<div style='color:red; padding:20px;'>伺服器連線失敗，請檢查金鑰設定。</div>";
            }
        }

        function openGame() {
            const grid = document.getElementById("gameGrid");
            grid.innerHTML = "";
            document.getElementById("gameOverlay").style.display = "block";
            
            let cards = [];
            let words = Object.keys(currentVocab).sort(() => Math.random() - 0.5).slice(0, 8);
            
            words.forEach(word => {
                const info = currentVocab[word];
                cards.push({ type: 'en', id: word, content: `<h2 style="color:#3b82f6; font-size:2.2em;">${word.toUpperCase()}</h2>`, label: "英文" });
                cards.push({ type: 'zh', id: word, content: `<h2 style="color:#c2410c;">${info.chinese}</h2>`, label: "中文" });
            });

            cards.sort(() => Math.random() - 0.5).forEach(card => {
                const div = document.createElement("div");
                div.className = "card";
                div.innerHTML = `<small style="color:#94a3b8; font-weight:bold; margin-bottom:10px;">${card.label}</small>${card.content}`;
                div.onclick = () => handleCardClick(div, card);
                grid.appendChild(div);
            });
        }

        function handleCardClick(div, card) {
            if (div.classList.contains('matched')) return;
            div.classList.add('selected');

            if (!firstCard) {
                firstCard = { div, card };
            } else {
                if (firstCard.div === div) return;
                if (firstCard.card.id === card.id && firstCard.card.type !== card.type) {
                    div.classList.replace('selected', 'matched');
                    firstCard.div.classList.replace('selected', 'matched');
                    firstCard = null;
                } else {
                    setTimeout(() => {
                        div.classList.remove('selected');
                        firstCard.div.classList.remove('selected');
                        firstCard = null;
                    }, 400);
                }
            }
        }

        function closeGame() { document.getElementById("gameOverlay").style.display = "none"; }

        async function exportCSV() {
            const response = await fetch('/export_data', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ vocabulary: currentVocab })
            });
            const blob = await response.blob();
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = "智慧英語單字清單.csv";
            a.click();
        }
    </script>
</body>
</html>
