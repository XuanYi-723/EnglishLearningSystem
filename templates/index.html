<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>智慧英語學習系統 - Gemini AI 版</title>
    <style>
        body { margin: 0; font-family: 'Segoe UI', Arial; background-color: #f1f5f9; color: #1e293b; }
        .container { display: flex; height: 100vh; }
        .left { flex: 4; padding: 25px; background: white; border-right: 1px solid #e2e8f0; overflow-y: auto; }
        .right { flex: 6; padding: 25px; overflow-y: auto; }
        textarea { width: 100%; height: 200px; padding: 15px; border-radius: 12px; border: 2px solid #cbd5e1; font-size: 16px; box-sizing: border-box; }
        .level-btn { background: #f1f5f9; color: #475569; border: none; padding: 10px 18px; margin: 5px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .level-btn.active { background: #3b82f6; color: white; }
        .action-btn { background: #f59e0b; color: white; border: none; padding: 15px; border-radius: 12px; font-size: 18px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 15px; }
        
        /* 紫色系列代表 AI 功能 */
        .game-btn { background: #8b5cf6; color: white; border: none; padding: 12px; border-radius: 12px; font-size: 16px; font-weight: bold; cursor: pointer; width: 100%; margin-top: 10px; display: none; }
        .csv-btn { background: #10b981; color: white; border: none; padding: 10px; border-radius: 8px; cursor: pointer; margin-top: 10px; width: 100%; display: none; }
        
        #gameOverlay { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 1000; padding: 20px; box-sizing: border-box; color: white; text-align: center; overflow-y: auto; }
        .game-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 15px; max-width: 1000px; margin: 20px auto; }
        .card { background: white; color: #333; padding: 15px; border-radius: 12px; cursor: pointer; min-height: 120px; display: flex; flex-direction: column; align-items: center; justify-content: center; transition: 0.3s; border: 4px solid transparent; }
        .card img { width: 80px; height: 80px; object-fit: cover; border-radius: 8px; margin-bottom: 5px; }
        .card.selected { border-color: #8b5cf6; transform: scale(1.05); }
        .card.matched { background: #dcfce7; cursor: default; opacity: 0.6; }

        mark { background: #fef08a; padding: 2px; border-radius: 4px; }
        
        /* 優化後的單字卡片 */
        .word-card { 
            background: white; 
            padding: 20px; 
            margin-bottom: 15px; 
            border-radius: 15px; 
            border-left: 8px solid #8b5cf6; 
            box-shadow: 0 4px 6px rgba(0,0,0,0.05); 
        }
        .ai-tag {
            background: #ede9fe;
            color: #7c3aed;
            padding: 2px 8px;
            border-radius: 5px;
            font-size: 11px;
            font-weight: bold;
            margin-left: 10px;
        }
        .ai-content {
            background: #f8fafc;
            padding: 12px;
            border-radius: 10px;
            margin-top: 10px;
            font-size: 0.95em;
            line-height: 1.6;
            color: #334155;
        }
    </style>
</head>
<body>
    <div id="gameOverlay">
        <h1>🎴 單字牌卡連連看</h1>
        <p>請點選一個「英文卡」和一個「中文卡」來配對！</p>
        <button onclick="closeGame()" style="padding: 10px 20px; border-radius: 8px; cursor: pointer; border:none; background:#ef4444; color:white; font-weight:bold;">結束遊戲</button>
        <div id="gameGrid" class="game-grid"></div>
    </div>

    <div class="container">
        <div class="left">
            <h2>1. 輸入教材文章</h2>
            <textarea id="textInput" placeholder="請貼上欲分析的英文文章..."></textarea>
            
            <h2 style="margin-top:20px;">2. 選擇學生程度</h2>
            <button onclick="selectLevel('簡單', this)" class="level-btn">簡單</button>
            <button onclick="selectLevel('中等', this)" class="level-btn">中等</button>
            <button onclick="selectLevel('困難', this)" class="level-btn">困難</button>
            <button onclick="selectLevel('全部', this)" class="level-btn">全部</button>

            <div id="actionArea" style="display:none;">
                <button onclick="analyze()" class="action-btn">🚀 啟動 Gemini AI 分析</button>
                <button id="gameBtn" class="game-btn" onclick="openGame()">🎮 玩牌卡連連看</button>
                <button id="csvBtn" class="csv-btn" onclick="exportCSV()">📁 下載學習清單 (CSV)</button>
            </div>
        </div>
        <div class="right">
            <h2>3. AI 導師分析成果</h2>
            <div id="highlightedArticle" style="background:white; padding:20px; border-radius:10px; margin-bottom:15px; line-height:1.6;">等待分析...</div>
            <div id="output"></div>
        </div>
    </div>

    <script>
        let currentLevel = "全部";
        let currentVocab = null;
        let firstCard = null;

        function selectLevel(level, btn) {
            currentLevel = level;
            document.getElementById("actionArea").style.display = "block";
            document.querySelectorAll('.level-btn').forEach(b => b.classList.remove('active'));
            btn.classList.add('active');
        }

        async function analyze() {
            const text = document.getElementById("textInput").value;
            const outputDiv = document.getElementById("output");
            outputDiv.innerHTML = "<div style='text-align:center;'>🔮 Gemini AI 正在備課中，請稍候...</div>";

            try {
                const response = await fetch('/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: text, level: currentLevel })
                });
                const data = await response.json();
                currentVocab = data.vocabulary;

                document.getElementById("highlightedArticle").innerHTML = data.highlighted;
                document.getElementById("gameBtn").style.display = "block";
                document.getElementById("csvBtn").style.display = "block";

                let html = "";
                for (let word in data.vocabulary) {
                    let item = data.vocabulary[word];
                    // 將換行符號轉為網頁換行
                    let formattedDef = item.definition.replace(/\n/g, '<br>');
                    
                    html += `<div class="word-card">
                        <b style="font-size:1.3em;">${word.toUpperCase()}</b> 
                        <span class="ai-tag">Gemini AI 導師</span>
                        <span style="font-size:0.8em; color:#94a3b8; margin-left:5px;">(${item.level})</span><br>
                        <span style="color:#64748b;">${item.pos} | ${item.phonetic}</span><br>
                        <b style="color:#c2410c; display:block; margin-top:5px;">${item.chinese}</b>
                        <div class="ai-content">${formattedDef}</div>
                    </div>`;
                }
                outputDiv.innerHTML = html || "找不到單字。";
            } catch (e) {
                outputDiv.innerHTML = "<div style='color:red;'>連線失敗，請確保後端已正確啟動。</div>";
            }
        }

        function openGame() {
            const grid = document.getElementById("gameGrid");
            grid.innerHTML = "";
            document.getElementById("gameOverlay").style.display = "block";
            
            let cards = [];
            let words = Object.keys(currentVocab).slice(0, 6);
            
            words.forEach(word => {
                const info = currentVocab[word];
                cards.push({
                    type: 'en',
                    id: word,
                    content: info.is_abstract ? `<p style="font-size:11px; padding:5px;">"${word.toUpperCase()}"</p>` : `<img src="https://loremflickr.com/150/150/${word}">`,
                    label: word.toUpperCase()
                });
                cards.push({
                    type: 'zh',
                    id: word,
                    content: `<h2 style="color:#c2410c; margin:0;">${info.chinese}</h2>`,
                    label: "中文意思"
                });
            });

            cards.sort(() => Math.random() - 0.5).forEach(card => {
                const div = document.createElement("div");
                div.className = "card";
                div.innerHTML = `<small style="color:#94a3b8; margin-bottom:5px;">${card.label}</small>${card.content}`;
                div.onclick = () => handleCardClick(div, card);
                grid.appendChild(div);
            });
        }

        function handleCardClick(div, card) {
            if (div.classList.contains('matched')) return;
            if (firstCard && firstCard.div === div) return;

            div.classList.add('selected');

            if (!firstCard) {
                firstCard = { div, card };
            } else {
                if (firstCard.card.id === card.id && firstCard.card.type !== card.type) {
                    div.classList.replace('selected', 'matched');
                    firstCard.div.classList.replace('selected', 'matched');
                    firstCard = null;
                } else {
                    setTimeout(() => {
                        div.classList.remove('selected');
                        firstCard.div.classList.remove('selected');
                        firstCard = null;
                    }, 500);
                }
            }
        }

        function closeGame() { document.getElementById("gameOverlay").style.display = "none"; }

        async function exportCSV() {
            const response = await fetch('/export_data', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ vocabulary: currentVocab })
            });
            const blob = await response.blob();
            const url = window.URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = "Gemini智慧單字學習清單.csv";
            a.click();
        }
    </script>
</body>
</html>
