services:
  - type: web
    name: english-learning-system
    env: python
    buildCommand: pip install -r requirements.txt && python -m spacy download en_core_web_sm
    startCommand: gunicorn app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
      - key: GOOGLE_API_KEY
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: GOOGLE_CREDS_JSON
        sync: false
      - key: SPREADSHEET_KEY
        sync: false
